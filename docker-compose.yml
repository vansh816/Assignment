version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: myapp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vansh
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis_db
    restart: always
    ports:
      - "6379:6379"